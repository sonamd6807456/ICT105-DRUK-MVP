<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Manage Events | Smart Campus Event Hub</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">

</head>

<body>

<div class="admin-container">

<aside class="admin-sidebar">

<h2>Admin Panel</h2>

<ul>

<li>

<a href="dashboard.html">

Dashboard

</a>

</li>

<li>

<a href="users.html">

Manage Users

</a>

</li>

<li class="active">

<a href="events.html">

Manage Events

</a>

</li>

<li>

<a href="reviews.html">

Manage Reviews

</a>

</li>

<li>

<a href="../index.html">

Back to Website

</a>

</li>

</ul>

</aside>

<main class="admin-main">

<h1>

Manage Events

</h1>

<button
class="btn-primary"
id="addEventBtn">

Add New Event

</button>

<br><br>

<table>

<thead>

<tr>

<th>Title</th>

<th>Category</th>

<th>Date</th>

<th>Seats</th>

<th>Registered</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="eventTable">

</tbody>

</table>

</main>

</div>

<div id="eventModal" class="modal">

<div class="modal-content">

<h2 id="modalTitle">

Add Event

</h2>

<form id="eventForm">

<input type="hidden" id="eventId">

<div class="form-group">

<label>Title</label>

<input
type="text"
id="title"
required>

</div>

<div class="form-group">

<label>Category</label>

<input
type="text"
id="category"
required>

</div>

<div class="form-group">

<label>Date</label>

<input
type="date"
id="date"
required>

</div>

<div class="form-group">

<label>Location</label>

<input
type="text"
id="location"
required>

</div>

<div class="form-group">

<label>Seats</label>

<input
type="number"
id="seats"
required>

</div>

<div class="form-group">

<label>Image URL</label>

<input
type="text"
id="image"
required>

</div>

<button
type="submit"
class="btn-primary">

Save Event

</button>

<button
type="button"
class="btn-delete"
id="closeModal">

Cancel

</button>

</form>

</div>

</div>

<script src="../js/storage.js"></script>
<script src="../js/main.js"></script>
<script src="../js/admin-events.js"></script>

<div id="toast" class="toast"></div>

</body>

</html>

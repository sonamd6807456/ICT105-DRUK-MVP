</head>

<body>

<header>

<div class="logo">

</div>

<nav>

<!-- Banner -->

<section class="profile-banner">

<h1>Student Profile</h1>

<p>

Manage your personal information.

</p>

</section>

<!-- Profile Section -->

<section class="profile-container">

<div class="profile-card">

<div class="profile-image">

<img src="images/default-user.png"
id="profilePreview"
alt="Profile Picture">

<input
type="file"
id="profileImage"
accept="image/*">

</div>

<div class="profile-details">

<form id="profileForm">

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="fullname"
required>

</div>

<div class="form-group">

<label>Student ID</label>

<input
type="text"
id="studentid"
readonly>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email"
required>

</div>

<div class="form-group">

<label>Phone Number</label>

<input
type="text"
id="phone"
required>

</div>

<div class="form-group">

<label>Faculty</label>

<input
type="text"
id="faculty"
readonly>

</div>

<hr>

<h2>Change Password</h2>

<div class="form-group">

<label>New Password</label>

<input
type="password"
id="newPassword">

</div>

<div class="form-group">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword">

</div>

<button type="submit">

Save Changes

</button>

</form>

</div>

</div>

</section>

<footer>

<p>

© 2026 Smart Campus Event Hub

</p>

</footer>

</body>

</html>

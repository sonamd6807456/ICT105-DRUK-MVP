<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reviews | Smart Campus Event Hub</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/reviews.css">
<link rel="stylesheet" href="css/responsive.css">

<script defer src="js/reviews.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">

<h2> Smart Campus Event Hub</h2>

</div>

<nav>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="profile.html">Profile</a></li>
<li><a href="reviews.html" class="active">Reviews</a></li>

</ul>

<div class="hamburger">☰</div>

</nav>

</header>

<!-- Banner -->

<section class="review-banner">

<h1>Event Reviews</h1>

<p>

Share your experience with campus events.

</p>

</section>

<!-- Review Form -->

<section class="review-container">

<div class="review-card">

<h2>Write a Review</h2>

<form id="reviewForm">

<label>Select Event</label>

<select id="eventName">

<option>AI Workshop 2026</option>
<option>Hackathon</option>
<option>Career Fair</option>
<option>Sports Day</option>
<option>Cultural Festival</option>
<option>Volunteer Camp</option>

</select>

<label>Rating</label>

<div class="stars">

<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>

</div>

<input type="hidden" id="rating" value="0">

<label>Comment</label>

<textarea
id="comment"
rows="6"
placeholder="Write your review..."
required></textarea>

<button type="submit">

Submit Review

</button>

</form>

</div>

</section>

<!-- Review List -->

<section>

<h2 class="section-title">

Student Reviews

</h2>

<div id="reviewList" class="review-grid">

</div>

</section>

<footer>

<p>

© 2026 Smart Campus Event Hub

</p>

</footer>

</body>

</html>

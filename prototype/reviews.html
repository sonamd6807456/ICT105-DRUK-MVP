<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reviews | Smart Campus Event Hub</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/reviews.css">

    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header class="header">

    <div class="container">

        <a href="dashboard.html" class="logo">


            <img src="images/logo1.webp" alt="Logo">

            <span>Smart Campus Event Hub</span>

        </a>

        <nav class="navbar">

            <ul class="nav-menu">

                <li><a href="dashboard.html">Dashboard</a></li>

                <li><a href="events.html">Events</a></li>

                <li><a href="favorites.html">Favorites</a></li>

                <li><a href="reviews.html" class="active">Reviews</a></li>

                <li><a href="profile.html">Profile</a></li>

            </ul>

        </nav>

    </div>

</header>

<section class="page-banner">

    <div class="container">

        <h1>Event Reviews</h1>

        <p>

            Share your experience with campus events.

        </p>

    </div>

</section>

<section class="profile-section">

    <div class="container">

        <div class="profile-card">

            <h2>Write a Review</h2>

            <form id="reviewForm">

                <div class="form-group">

                    <label>Select Event</label>

                    <select id="eventSelect" required>

                        <option value="">

                            Choose an Event

                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Rating</label>

                    <select id="rating" required>

                        <option value="">Select Rating</option>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Very Good</option>
                        <option value="3">3 - Good</option>
                        <option value="2">2 - Fair</option>
                        <option value="1">1 - Poor</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Comment</label>

                    <textarea id="comment"
                              rows="5"
                              required></textarea>

                </div>

                <button
                    type="submit"
                    class="btn-primary">

                    Submit Review

                </button>

            </form>

        </div>

        <br><br>

        <div id="reviewList">

        </div>

    </div>

</section>

<footer class="footer">

    <div class="container">

        <p>

            © 2026 Smart Campus Event Hub

        </p>

    </div>

</footer>

<script src="js/storage.js"></script>
<script src="js/main.js"></script>
<script src="js/reviews.js"></script>

<div id="toast" class="toast"></div>

</body>

</html>

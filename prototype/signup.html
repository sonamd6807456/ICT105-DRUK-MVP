<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up | Smart Campus Event Hub</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/signup.css">
<link rel="stylesheet" href="css/responsive.css">

<script defer src="js/signup.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">
<h2> Smart Campus Event Hub</h2>
</div>

<nav>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="profile.html">Profile</a></li>
<li><a href="reviews.html">Reviews</a></li>
<li><a href="login.html" class="btn">Login</a></li>

</ul>

<div class="hamburger">☰</div>

</nav>

</header>

<section class="signup-section">

<div class="signup-container">

<div class="signup-left">

<h1>Create Your Account</h1>

<p>

Join Smart Campus Event Hub and discover exciting
events happening around Rangsit University.

</p>

<img src="images/signup.png" alt="Sign Up">

</div>

<div class="signup-right">

<h2>Student Registration</h2>

<form id="signupForm">

<div class="input-box">

<label>Full Name</label>

<input
type="text"
id="fullname"
placeholder="Enter Full Name"
required>

</div>

<div class="input-box">

<label>Student ID</label>

<input
type="text"
id="studentid"
placeholder="66XXXXXXXX"
required>

</div>

<div class="input-box">

<label>University Email</label>

<input
type="email"
id="email"
placeholder="student@rsu.ac.th"
required>

</div>

<div class="input-box">

<label>Phone Number</label>

<input
type="tel"
id="phone"
placeholder="08XXXXXXXX"
required>

</div>

<div class="input-box">

<label>Faculty</label>

<select id="faculty">

<option>Information and Communication Technology</option>
<option>Business Administration</option>
<option>Engineering</option>
<option>Architecture</option>
<option>International College</option>
<option>Arts</option>

</select>

</div>

<div class="input-box">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Password"
required>

<span id="togglePassword">



</span>

</div>

</div>

<div class="input-box">

<label>Confirm Password</label>

<div class="password-box">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<span id="toggleConfirm">



</span>

</div>

</div>

<div class="terms">

<label>

<input type="checkbox" id="agree">

I agree to the Terms & Conditions

</label>

</div>

<button type="submit">

Create Account

</button>

</form>

<div class="login-link">

Already have an account?

<a href="login.html">

Login Here

</a>

</div>

</div>

</div>

</section>

<footer>

<p>

© 2026 Smart Campus Event Hub

</p>

</footer>

</body>

</html>
